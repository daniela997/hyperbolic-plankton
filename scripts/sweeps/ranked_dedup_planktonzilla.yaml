# ranked-dedup sweep on Planktonzilla (euclidean, no-proj) — 4x A6000 cluster pod.
#
# ranked-dedup = ragged-aware RINCE (full-bank depth-graded negatives + dedup + symmetric T->I),
# the fix for hybrid's per-rank-keep species starvation (see hybrid-ragged-starvation memory).
# Baselines @ step 2285, matched recipe: hybrid 0.07 < plain-RINCE 0.24 < plain-CL 0.37. This
# sweep tunes ranked-dedup's RECIPE (not the loss's tau schedule — left at defaults 0.1/0.5).
#
# FIXED (not swept): euclidean, no-proj, ranked-dedup, 12+12 LoRA blocks, batch 2048
# (micro-bs 512 x accum 1 x 4 GPUs — cross-GPU gather gives the full 2048 negatives; accum=1
# = exact gradient, so NO --cache-accum-cl). 20 epochs. tau schedule at defaults (0.1/0.5).
# SWEPT: lr 5e-5..2.5e-4, wd {1e-4,1e-2,2e-1}, scheduler {onecycle,warmupcos}.
# PINNED: lora_r=32, lora_alpha=32 — matched to the E0c plain-CL baseline so the comparison
# isolates the LOSS, not capacity (see the lora_r comment below).
#
# NOTE: this config is for the FIXED loss (commit 5a3abbc, ragged self-match). Earlier sweeps
# tuned a broken objective where truncated lineages never self-matched at full depth — their
# rankings are not reliable guides.
#
# THE COMPARISON: E0c plain-CL baseline (run 0o1s0wpx) = r32/alpha32(default)/wd0.2/lr1e-4/
# warmupcos/batch768 -> FULL-SPLIT test/seen/species_f1 0.634. Best ranked-dedup so far
# (r6h04z4f/1lsy24y1, r64/a64/wd1e-4/lr5.03e-5/batch2048) = 0.6245 — but that run had 2x the
# capacity and a larger rsLoRA step, so the -0.01 gap was NOT attributable to the loss. With
# capacity pinned here, a win/loss vs 0.634 is a statement about ranked-dedup itself.
# CAVEAT still open: batch differs (this sweep runs 2048 via 512x1x4 GPUs vs E0c's 768).
#
# Metric: eval/seen/species_f1 (the headline rank the starvation hit). bayes search.
#
# CLUSTER USAGE (in the pod; venv at /root/hp-venv, cache staged at /root/pz_cache):
#   cd /mnt/resources/hyperbolic-plankton && git pull --ff-only
#   export HP_CACHE=/root/pz_cache HP_SPLIT_DIR=/mnt/indices/hyperbolic_plankton_splits \
#          HP_CKPT_DIR=/mnt/resources/hyperbolic_plankton_ckpts HP_WANDB_DIR=/mnt/resources/wandb
#   /root/hp-venv/bin/wandb sweep --project hyperbolic-plankton-sweep scripts/sweeps/ranked_dedup_planktonzilla.yaml
#   # then run the agent it prints (each trial = one full 20-epoch 4-GPU run):
#   /root/hp-venv/bin/wandb agent uofg/hyperbolic-plankton-sweep/<id>

program: scripts/train_lora.py
method: bayes
metric:
  name: eval/seen/species_f1
  goal: maximize

# Hyperband early-termination: ONE cull, early. min_iter=7/eta=3 puts brackets at 7 and 21 —
# and since runs are 20 epochs, the 21 bracket NEVER FIRES. So a trial is judged once (epoch 7)
# and, if it survives, runs to completion undisturbed.
#
# Why: at min_iter=5/eta=3 the brackets were 5 and 15, and the epoch-15 cull killed f59oyyzv at
# 75% done — it was only 0.023 behind the leaders and climbing steeply (+0.023 in its last epoch,
# while the leader was flattening), so it plausibly would have finished competitive. Hyperband
# ranks on LEVEL, not slope, so late climbers with a higher lr get punished. And culling at 15
# saves only 5 of 20 epochs anyway — tiny savings for a real risk. Culling at 7 saves 13 epochs
# per bad trial (the savings that actually matter) and leaves the late race alone.
#
# A diverged trial (NaN) self-aborts via train_lora's divergence guard, logging species_f1=0 ->
# culled at the epoch-7 bracket regardless.
early_terminate:
  type: hyperband
  min_iter: 7
  eta: 3

parameters:
  # CAPACITY PINNED to the E0c baseline (r=32; E0c passed lora_alpha=None -> alpha defaults to
  # r=32). Capacity is the STRUCTURAL knob — it changes model expressiveness, so leaving it free
  # made the ranked-dedup-vs-E0c comparison unattributable (the 0.6245 run used r64/a64, i.e. 2x
  # capacity AND a 41% larger rsLoRA step, alpha/sqrt(r) = 8.0 vs E0c's 5.66). Pinning it to E0c's
  # value isolates the LOSS. lr/wd/scheduler stay swept: those are optimizer settings a different
  # loss may legitimately want tuned differently.
  lora_r:
    values: [32]
  lora_alpha:
    values: [32]
  # lr NARROWED to 5e-5..2.5e-4 from evidence: the post-fix winner is 9.97e-05 (test 0.608), and
  # pre-fix everything >=3.7e-4 collapsed (0.45/0.41/0.23) while the whole top-6 sat in
  # 6.6e-5..2.0e-4. No trial above 2.5e-4 has ever finished well, so stop spending trials there.
  # (E0c's own lr was 1e-4 — inside this range.)
  lr:
    distribution: log_uniform_values
    min: 5.0e-5
    max: 2.5e-4
  # wd 0.2 RE-ADDED (it is E0c's value): it scored poorly for ranked-dedup before, but with
  # capacity now pinned to the baseline we want to know whether ranked-dedup can win at the
  # baseline's own wd, not just at its preferred one. Keep the two that produced winners too.
  wd:
    values: [1.0e-4, 1.0e-2, 2.0e-1]
  scheduler:
    values: [warmupcos, onecycle]      # keep both: warmupcos is the only post-fix survivor and
                                       # took 4 of the pre-fix top-6, but 1 survivor is thin
                                       # evidence — let bayes confirm rather than pre-decide.

command:
  - ${env}
  - /root/hp-venv/bin/torchrun
  - --nproc_per_node=4
  - --master_port=29573
  - ${program}
  - --dataset=planktonzilla
  - --backbone=clip
  - --geometry=euclidean
  - --contrastive=ranked-dedup
  - --rince-sim=distance
  - --no-proj
  - --epochs=20
  - --micro-bs=512
  - --accum=1
  - --lora-visual-blocks=12
  - --lora-text-blocks=12
  - --warmup-frac=0.1
  - --onecycle-pct-start=0.3
  - --onecycle-min-lr=1e-6
  - --lambda-cl=1.0
  - --lambda-sel=0.0
  - --seed=0
  - --compile
  - --eval-epochs=1.0
  - --num-workers=8
  - --wandb-project=hyperbolic-plankton-sweep
  - ${args}   # swept: lr, wd, scheduler (lora_r/alpha PINNED to 32 = E0c baseline capacity)
