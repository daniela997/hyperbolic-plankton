# Phase 1: find a good peak LR for Euclidean E0c LoRA under OneCycleLR (Taxonomy-paper
# schedule, built for super-convergence in fewer epochs). Short (5ep) proxy runs judged on
# the subsample monitor's deepest-rank seen F1 (rank-orders configs reliably; absolute
# values are biased low vs the full split). lr here = OneCycle PEAK (reached after the 30%
# warmup), so values run a bit higher than a plateau-LR sweep would.
#
# Only `lr` is swept (in `parameters`); EVERYTHING ELSE — including the store_true flags
# (--compile/--no-proj/--no-final-eval), which the agent cannot serialize as --flag=True —
# is hard-coded in `command:` as bare flags. ${args} then expands ONLY the swept lr.
#
#   cd /home/daniela/mine/hyperbolic-plankton
#   wandb sweep --project hyperbolic-plankton-euclidean scripts/sweeps/e0c_lr_phase1.yaml
#   PYTHONPATH=src CUDA_VISIBLE_DEVICES=0 wandb agent <entity>/hyperbolic-plankton-euclidean/<sweep_id>
#   PYTHONPATH=src CUDA_VISIBLE_DEVICES=1 wandb agent <entity>/hyperbolic-plankton-euclidean/<sweep_id>

program: scripts/train_lora.py
method: grid
metric:
  name: eval/seen/species_f1
  goal: maximize

parameters:
  lr:   # OneCycle peak LR
    values: [3.0e-4, 6.0e-4, 1.0e-3, 2.0e-3]

command:
  - ${env}
  - python
  - ${program}
  - --dataset=planktonzilla
  - --backbone=clip
  - --epochs=5
  - --micro-bs=128
  - --accum=3
  - --wd=0.2
  - --optimizer=adamw
  - --scheduler=onecycle
  - --onecycle-pct-start=0.3
  - --onecycle-min-lr=1e-6
  - --lora-r=32
  - --lora-visual-blocks=12
  - --lora-text-blocks=12
  - --lambda-cl=1.0
  - --cl-mask=none
  - --geometry=euclidean
  - --eval-epochs=0.5
  - --eval-cap=50
  - --wandb-project=hyperbolic-plankton-euclidean
  - --no-proj
  - --compile
  - --no-final-eval
  - ${args}   # expands the swept params (only lr) as --lr=<value>
